name: Build and Deploy database-service

on:
push:
branches:
  - main
 workflow_dispatch:

 jobs:
 build:
 runs-on: ubuntu-latest


 steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '17'

  - name: Build Maven project
    run: |
      cd board
      mvn clean package -DskipTests

  - name: Configure AWS credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ secrets.AWS_REGION }}

  - name: Login to Amazon ECR
    uses: aws-actions/amazon-ecr-login@v2

  - name: Build Docker image
    run: |
      IMAGE_TAG=$(date +%s)
      echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
      docker build -t database-service:$IMAGE_TAG ./board

  - name: Tag Docker image
    run: |
      ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      docker tag database-service:${{ env.IMAGE_TAG }} \
      $ACCOUNT_ID.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

  - name: Push image to ECR
    run: |
      ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      docker push \
      $ACCOUNT_ID.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

  - name: Update kubeconfig
    run: |
      aws eks update-kubeconfig \
      --name ${{ secrets.EKS_CLUSTER_NAME }} \
      --region ${{ secrets.AWS_REGION }}

  - name: Deploy to Kubernetes
    run: |
      kubectl apply -f board/k8s/namespace.yaml
      kubectl apply -f board/k8s/deployment.yaml -n ${{ secrets.K8S_NAMESPACE }}
      kubectl apply -f board/k8s/service.yaml -n ${{ secrets.K8S_NAMESPACE }}

