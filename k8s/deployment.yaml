apiVersion: apps/v1
kind: Deployment
metadata:
  name: database-service-deployment
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: database-service
  template:
    metadata:
      labels:
        app: database-service
    spec:
      containers:
        - name: database-service-container
          image: <YOUR_ECR_IMAGE_URL>
          ports:
            - containerPort: 8080
