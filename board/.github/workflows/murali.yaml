name: Build and Deploy database-service-project

on:
push:
branches:
- main
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up Java
    uses: actions/setup-java@v4
    with:
      distribution: 'temurin'
      java-version: '17'

  - name: Build with Maven
    run: mvn clean package -DskipTests

  - name: Find JAR file
    run: echo "JAR_FILE=$(ls target/*.jar | head -n 1)" >> $GITHUB_ENV

  - name: Upload JAR artifact
    uses: actions/upload-artifact@v4
    with:
      name: jar-file
      path: ${{ env.JAR_FILE }}

  - name: Build, Test and SonarQube Scan
    run: |
      mvn clean verify sonar:sonar \
        -Dsonar.projectKey=database-service-project \
        -Dsonar.host.url="${{ secrets.SONAR_HOST_URL }}" \
        -Dsonar.login="${{ secrets.SONAR_TOKEN }}"

  - name: Configure AWS
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ secrets.AWS_REGION }}

  - name: Login to Amazon ECR
    uses: aws-actions/amazon-ecr-login@v2

  - name: Trivy FS Scan
    uses: aquasecurity/trivy-action@0.20.0
    with:
      scan-type: 'fs'
      scan-ref: '.'
      severity: 'HIGH,CRITICAL'
      ignore-unfixed: true

  - name: Build Docker Image
    run: |
      IMAGE_TAG=$(date +%s)
      echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
      docker build -t database-service:$IMAGE_TAG .

  - name: Tag Docker Image for ECR
    run: |
      ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      docker tag database-service:${{ env.IMAGE_TAG }} \
      $ACCOUNT_ID.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

  - name: Trivy Image Scan
    uses: aquasecurity/trivy-action@0.20.0
    with:
      scan-type: image
      image-ref: database-service:${{ env.IMAGE_TAG }}
      severity: HIGH,CRITICAL

  - name: Push to ECR
    run: |
      ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      docker push \
      $ACCOUNT_ID.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

  - name: Update kubeconfig
    run: |
      aws eks update-kubeconfig \
      --name ${{ secrets.EKS_CLUSTER_NAME }} \
      --region ${{ secrets.AWS_REGION }}

  - name: Apply Kubernetes manifests
    run: |
      kubectl apply -f k8s/namespace.yaml
      kubectl apply -f k8s/deployment.yaml -n ${{ secrets.K8S_NAMESPACE }}
      kubectl apply -f k8s/service.yaml -n ${{ secrets.K8S_NAMESPACE }}

  - name: Deploy new image to EKS
    run: |
      ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

      kubectl set image deployment/database-service-deployment \
      database-service-container=$ACCOUNT_ID.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
      -n ${{ secrets.K8S_NAMESPACE }}

      kubectl rollout status deployment/database-service-deployment \
      -n ${{ secrets.K8S_NAMESPACE }} --timeout=200s
```
